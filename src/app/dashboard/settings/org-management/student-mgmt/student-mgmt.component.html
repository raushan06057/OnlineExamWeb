<div class="row">
    <div class="col-xl-12">
      <div class="card">
        <div class="card-header align-items-center d-flex">
          <h4 class="card-title mb-0 flex-grow-1">Search</h4>
        </div><!-- end card header -->
        <div class="card-body">
          <div class="live-preview">
            <div class="row">
              <form [formGroup]="studentForm">
                <div class="col-xxl-6 col-md-4">
                  <label for="exampleInputrounded" class="form-label">First Name</label>
                  <input type="text" class="form-control rounded-pill" placeholder="Enter First Name" formControlName="firstName" />
                </div>
                <div class="col-xxl-6 col-md-4">
                  <label for="exampleInputrounded" class="form-label">Last Name</label>
                  <input type="text" class="form-control rounded-pill" placeholder="Enter Last Name" formControlName="lastName" />
                </div>
                <div class="col-xxl-6 col-md-4">
                  <label for="exampleInputrounded" class="form-label">Middle Name</label>
                  <input type="text" class="form-control rounded-pill" placeholder="Enter Middle Name" formControlName="middleName" />
                </div>
                <div class="col-xxl-6 col-md-4">
                  <label for="exampleInputrounded" class="form-label">Department</label>
                  <input type="number" class="form-control rounded-pill" placeholder="Enter Department ID" formControlName="departmentId" />
                </div>
                <div class="col-xxl-6 col-md-4">
                  <label for="exampleInputrounded" class="form-label">Guardian</label>
                  <input type="number" class="form-control rounded-pill" placeholder="Enter Guardian ID" formControlName="guardianId" />
                </div>
                <div class="col-xxl-12 col-md-2">
                  <div class="d-flex flex-wrap searhbtn">
                    <button type="button" (click)="searchStudent()" class="btn btn-primary me-2 waves-effect waves-light mb-2">Search</button>
                    <button type="button" class="btn btn-info me-2 waves-effect waves-light mb-2">Export</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div> <!-- .col-->
  </div> <!-- end row-->
  
  <div class="row">
    <div class="col-lg-12">
      <div class="card tablegird">
        <div class="card-header">
          <h4 class="card-title mb-0 flex-grow-1">Student</h4>
          <button type="button" class="btn btn-info btnright waves-effect waves-light" (click)="createStudent()">Create</button>
        </div>
        <!-- end card header -->
        <div class="card-body">
          <div id="table-gridjs">
            <div role="complementary" class="gridjs gridjs-container" style="width: 100%;">
              <div class="gridjs-wrapper" style="height: auto;">
                <table role="grid" class="gridjs-table" style="height: auto;">
                  <thead class="gridjs-thead">
                    <tr class="gridjs-tr">
                      <th class="gridjs-th gridjs-th-sort" tabindex="0">
                        <div class="gridjs-th-content">First Name</div>
                      </th>
                      <th class="gridjs-th gridjs-th-sort" tabindex="0">
                        <div class="gridjs-th-content">Last Name</div>
                      </th>
                      <th class="gridjs-th gridjs-th-sort" tabindex="0">
                        <div class="gridjs-th-content">Middle Name</div>
                      </th>
                      <th class="gridjs-th gridjs-th-sort" tabindex="0">
                        <div class="gridjs-th-content">Email</div>
                      </th>
                      <th class="gridjs-th gridjs-th-sort" tabindex="0">
                        <div class="gridjs-th-content">Phone</div>
                      </th>
                      <th class="gridjs-th gridjs-th-sort" tabindex="0">
                        <div class="gridjs-th-content">Address</div>
                      </th>
                      <th class="gridjs-th gridjs-th-sort" tabindex="0">
                        <div class="gridjs-th-content">Department</div>
                      </th>
                      <th class="gridjs-th gridjs-th-sort" tabindex="0">
                        <div class="gridjs-th-content">Guardian</div>
                      </th>
                      <th class="gridjs-th gridjs-th-sort" tabindex="0">
                        <div class="gridjs-th-content">Action</div>
                      </th>
                    </tr>
                  </thead>
                  <tbody class="gridjs-tbody">
                    <tr class="gridjs-tr" *ngFor="let student of studentModels">
                      <td class="gridjs-td">{{student.firstName}}</td>
                      <td class="gridjs-td">{{student.lastName}}</td>
                      <td class="gridjs-td">{{student.middleName}}</td>
                      <td class="gridjs-td">{{student.emailAddress}}</td>
                      <td class="gridjs-td">{{student.phoneNumber}}</td>
                      <td class="gridjs-td">{{student.address}}</td>
                      <td class="gridjs-td">{{student.deptName}}</td>
                      <td class="gridjs-td">{{student.guardianName}}</td>
                      <td class="gridjs-td">
                        <button type="button" class="btn btn-primary btn-sm btn-icon waves-effect waves-light" (click)="editStudent(student.id)">
                          <i class="mdi mdi-pencil"></i>
                        </button>
                        <button type="button" class="btn btn-danger btn-sm btn-icon waves-effect waves-light" (click)="deleteStudent(student.id, student.firstName)">
                          <i class="ri-delete-bin-5-line"></i>
                        </button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
        <!-- end card-body -->
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->
  </div>
